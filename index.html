<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Ultimate City Racer Neon Edition</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
overflow:hidden;
font-family:'Poppins',sans-serif;
background:black;
touch-action:none;
}

canvas{
display:block;
}

#ui{
position:absolute;
top:12px;
left:12px;
z-index:10;
color:white;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
padding:14px;
border-radius:18px;
border:1px solid rgba(255,255,255,0.2);
min-width:190px;
}

.uiText{
font-size:15px;
margin:6px 0;
font-weight:600;
}

#speedBar{
width:170px;
height:10px;
background:#222;
border-radius:20px;
overflow:hidden;
margin-top:8px;
}

#speedFill{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ffcc,#ffee00,#ff2200);
transition:0.1s;
}

#message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:20;
display:none;
color:white;
font-size:38px;
font-weight:800;
text-align:center;
background:rgba(0,0,0,0.75);
padding:35px;
border-radius:25px;
backdrop-filter:blur(10px);
}

#message button{
margin-top:20px;
}

#startScreen{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:20;
text-align:center;
color:white;
background:rgba(0,0,0,0.7);
padding:40px;
border-radius:25px;
backdrop-filter:blur(12px);
width:90%;
max-width:460px;
border:1px solid rgba(255,255,255,0.2);
}

#startScreen h1{
font-size:40px;
margin-bottom:16px;
}

#startScreen p{
line-height:1.7;
opacity:0.95;
margin-bottom:25px;
}

#controls{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
gap:12px;
z-index:10;
flex-wrap:wrap;
padding:0 10px;
}

.controlBtn{
width:72px;
height:72px;
border:none;
border-radius:50%;
font-size:24px;
color:white;
font-weight:bold;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(8px);
}

#nitro{
background:linear-gradient(45deg,#ff2200,#ff8800);
}

#mode{
width:92px;
border-radius:20px;
font-size:13px;
background:linear-gradient(45deg,#0066ff,#00bbff);
}

#distance{
color:#00ff99;
}

#startBtn{
padding:16px 28px;
font-size:22px;
font-weight:700;
border:none;
border-radius:18px;
background:linear-gradient(45deg,#00ccff,#0066ff);
color:white;
cursor:pointer;
}

#minimap{
position:absolute;
right:15px;
top:15px;
width:120px;
height:180px;
background:rgba(0,0,0,0.45);
border-radius:20px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.15);
z-index:10;
}

#miniRoad{
position:absolute;
left:50%;
transform:translateX(-50%);
width:30px;
height:100%;
background:#444;
}

#miniPlayer{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:18px;
height:28px;
background:#ffff00;
border-radius:6px;
}

@media(max-width:600px){

#message{
font-size:28px;
width:90%;
}

}
</style>
</head>

<body>

<div id="ui">
<div class="uiText" id="score">Coins: 0</div>
<div class="uiText" id="speedText">Speed: 0 km/h</div>
<div class="uiText" id="distance">Distance: 0 m</div>

<div id="speedBar">
<div id="speedFill"></div>
</div>
</div>

<div id="minimap">
<div id="miniRoad"></div>
<div id="miniPlayer"></div>
</div>

<div id="message"></div>

<div id="startScreen">
<h1>🌆 Ultimate City Racer</h1>

<p>
🌈 Neon City Environment<br>
🚗 Smooth Driving Physics<br>
🔥 Nitro Boost Effects<br>
🌧 Dynamic Weather System<br>
📱 Mobile Tilt Controls<br>
⚠ Heavy Traffic & Obstacles
</p>

<button id="startBtn">START GAME</button>
</div>

<div id="controls">
<button class="controlBtn" id="left">⬅</button>
<button class="controlBtn" id="right">➡</button>
<button class="controlBtn" id="nitro">🔥</button>
<button class="controlBtn" id="mode">WEATHER</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

const scene = new THREE.Scene();

scene.fog = new THREE.Fog(0x000000,45,240);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
5000
);

camera.position.set(0,6,14);

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

renderer.setSize(window.innerWidth,window.innerHeight);

renderer.shadowMap.enabled=true;

document.body.appendChild(renderer.domElement);

/* LIGHTS */

const sun = new THREE.DirectionalLight(0xffffff,1.2);

sun.position.set(20,40,10);

sun.castShadow=true;

scene.add(sun);

const ambient = new THREE.AmbientLight(0xffffff,0.85);

scene.add(ambient);

/* ROAD */

const road = new THREE.Mesh(
new THREE.PlaneGeometry(24,12000),
new THREE.MeshStandardMaterial({
color:0x1b1b1b
})
);

road.rotation.x=-Math.PI/2;

road.position.z=-6000;

road.receiveShadow=true;

scene.add(road);

/* ROAD SIDE GLOW */

const sideGlow1 = new THREE.Mesh(
new THREE.PlaneGeometry(1,12000),
new THREE.MeshBasicMaterial({
color:0x00ffff
})
);

sideGlow1.rotation.x=-Math.PI/2;
sideGlow1.position.set(-12.2,0.02,-6000);

scene.add(sideGlow1);

const sideGlow2 = sideGlow1.clone();

sideGlow2.position.x=12.2;

scene.add(sideGlow2);

/* ROAD LINES */

const roadLines=[];

for(let i=0;i<300;i++){

const line = new THREE.Mesh(
new THREE.BoxGeometry(0.5,0.05,7),
new THREE.MeshBasicMaterial({
color:0xffffff
})
);

line.position.set(0,0.03,-i*40);

scene.add(line);

roadLines.push(line);

}

/* BUILDINGS */

const buildings=[];

const buildingColors=[
0xff3366,
0x00ccff,
0xffcc00,
0x00ff99,
0xaa66ff,
0xff6600,
0xff00ff,
0x66ff33,
0x00ffff
];

function createBuilding(x,z){

const h = Math.random()*70+20;

const geometry = new THREE.BoxGeometry(
Math.random()*6+8,
h,
Math.random()*6+8
);

const color = buildingColors[
Math.floor(Math.random()*buildingColors.length)
];

const material = new THREE.MeshStandardMaterial({
color:color,
emissive:color,
emissiveIntensity:0.18,
metalness:0.3,
roughness:0.5
});

const b = new THREE.Mesh(
geometry,
material
);

b.position.set(x,h/2,z);

b.castShadow=true;
b.receiveShadow=true;

scene.add(b);

buildings.push(b);

/* WINDOWS */

for(let i=0;i<8;i++){

const windowLight = new THREE.PointLight(
color,
0.7,
18
);

windowLight.position.set(
x+(Math.random()*6-3),
Math.random()*h,
z+(Math.random()*6-3)
);

scene.add(windowLight);

}

}

for(let i=0;i<180;i++){

createBuilding(-34,-i*45);
createBuilding(34,-i*45);

}

/* STREET LIGHTS */

const streetLights=[];

function createStreetLight(x,z){

const pole = new THREE.Mesh(
new THREE.CylinderGeometry(0.15,0.15,8),
new THREE.MeshStandardMaterial({
color:0xaaaaaa
})
);

pole.position.set(x,4,z);

scene.add(pole);

const light = new THREE.PointLight(
0xffddaa,
1,
50
);

light.position.set(x,8,z);

light.visible=false;

scene.add(light);

streetLights.push(light);

}

for(let i=0;i<150;i++){

createStreetLight(-13,-i*70);
createStreetLight(13,-i*70);

}

/* PLAYER */

const carGroup = new THREE.Group();

scene.add(carGroup);

const body = new THREE.Mesh(
new THREE.BoxGeometry(2,0.8,4),
new THREE.MeshStandardMaterial({
color:0xffff00,
metalness:0.5,
roughness:0.3
})
);

body.castShadow=true;

carGroup.add(body);

function wheel(x,z){

const w = new THREE.Mesh(
new THREE.CylinderGeometry(0.45,0.45,0.5,20),
new THREE.MeshStandardMaterial({
color:0x111111
})
);

w.rotation.z=Math.PI/2;

w.position.set(x,-0.45,z);

carGroup.add(w);

}

wheel(-1,-1.2);
wheel(1,-1.2);
wheel(-1,1.2);
wheel(1,1.2);

const headlights = new THREE.PointLight(
0xffffff,
1,
30
);

headlights.position.set(0,0.5,-2);

carGroup.add(headlights);

carGroup.position.y=0.7;

/* NITRO FLAME */

const nitroFlame = new THREE.Mesh(
new THREE.ConeGeometry(0.35,1.5,20),
new THREE.MeshBasicMaterial({
color:0xff5500
})
);

nitroFlame.rotation.x=Math.PI;

nitroFlame.position.z=2.7;

nitroFlame.visible=false;

carGroup.add(nitroFlame);

/* ENEMIES */

const enemies=[];

function createEnemy(z){

const e = new THREE.Mesh(
new THREE.BoxGeometry(2,0.8,4),
new THREE.MeshStandardMaterial({
color:Math.random()*0xffffff,
metalness:0.3
})
);

const lanes=[-7,-4,0,4,7];

e.position.set(
lanes[Math.floor(Math.random()*lanes.length)],
0.7,
z
);

e.castShadow=true;

scene.add(e);

enemies.push(e);

}

/* MORE TRAFFIC */

for(let i=0;i<90;i++){

createEnemy(-120-i*90);

}

/* OBSTACLES */

const obstacles=[];

function createObstacle(z){

const o = new THREE.Mesh(
new THREE.BoxGeometry(1.5,1.5,1.5),
new THREE.MeshStandardMaterial({
color:0xff2222,
emissive:0xaa0000
})
);

const lanes=[-7,-4,0,4,7];

o.position.set(
lanes[Math.floor(Math.random()*lanes.length)],
0.8,
z
);

scene.add(o);

obstacles.push(o);

}

for(let i=0;i<80;i++){

createObstacle(-150-i*110);

}

/* COINS */

const coins=[];

function createCoin(z){

const c = new THREE.Mesh(
new THREE.TorusGeometry(0.5,0.18,12,20),
new THREE.MeshStandardMaterial({
color:0xffd700,
emissive:0xffaa00
})
);

c.rotation.x=Math.PI/2;

c.position.set(
(Math.random()*12)-6,
1.4,
z
);

scene.add(c);

coins.push(c);

}

for(let i=0;i<160;i++){

createCoin(-80-i*55);

}

/* RAIN */

const rainGeo = new THREE.BufferGeometry();

const rainCount=3000;

const rainPos=[];

for(let i=0;i<rainCount;i++){

rainPos.push(
(Math.random()-0.5)*220,
Math.random()*100,
(Math.random()-0.5)*500
);

}

rainGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(rainPos,3)
);

const rainMat = new THREE.PointsMaterial({
color:0x99ccff,
size:0.15
});

const rain = new THREE.Points(
rainGeo,
rainMat
);

rain.visible=false;

scene.add(rain);

/* WEATHER */

let weather=0;

function applyWeather(){

if(weather===0){

scene.background=new THREE.Color(0x87ceeb);

rain.visible=false;

streetLights.forEach(l=>l.visible=false);

scene.fog.color.set(0x87ceeb);

}

if(weather===1){

scene.background=new THREE.Color(0x000011);

rain.visible=false;

streetLights.forEach(l=>l.visible=true);

scene.fog.color.set(0x000011);

}

if(weather===2){

scene.background=new THREE.Color(0x444466);

rain.visible=true;

streetLights.forEach(l=>l.visible=true);

scene.fog.color.set(0x444466);

}

}

applyWeather();

document.getElementById("mode").onclick=()=>{

weather=(weather+1)%3;

applyWeather();

};

/* CONTROLS */

let keys={};

document.addEventListener("keydown",e=>keys[e.key]=true);

document.addEventListener("keyup",e=>keys[e.key]=false);

left.onpointerdown=()=>keys["ArrowLeft"]=true;
left.onpointerup=()=>keys["ArrowLeft"]=false;

right.onpointerdown=()=>keys["ArrowRight"]=true;
right.onpointerup=()=>keys["ArrowRight"]=false;

/* MOBILE TILT */

let tilt=0;

if(/Android|iPhone|iPad/i.test(navigator.userAgent)){

window.addEventListener("deviceorientation",e=>{

tilt=e.gamma||0;

});

}

/* NITRO */

let nitro=false;

const nitroBtn=document.getElementById("nitro");

nitroBtn.onpointerdown=()=>nitro=true;
nitroBtn.onpointerup=()=>nitro=false;

/* GAME */

let score=0;

let speed=0;

let distance=0;

let gameOver=true;

const scoreText=document.getElementById("score");
const speedText=document.getElementById("speedText");
const speedFill=document.getElementById("speedFill");
const distanceText=document.getElementById("distance");

document.getElementById("startBtn").onclick=()=>{

gameOver=false;

document.getElementById("startScreen").style.display="none";

};

function endGame(text){

gameOver=true;

const msg=document.getElementById("message");

msg.innerHTML=`
${text}<br>
<button onclick="location.reload()">
RESTART
</button>
`;

msg.style.display="block";

}

/* CAMERA SHAKE */

function shakeCamera(){

camera.position.x+=(Math.random()-0.5)*0.12;
camera.position.y+=(Math.random()-0.5)*0.12;

}

/* ANIMATION */

function animate(){

requestAnimationFrame(animate);

if(!gameOver){

/* REDUCED SPEED */

speed += ((nitro?140:72)-speed)*0.06;

distance += speed*0.018;

const moveSpeed = nitro ? 1.45 : 0.78;

carGroup.position.z -= moveSpeed;

/* CONTROLS */

if(keys["ArrowLeft"]) carGroup.position.x -= 0.28;

if(keys["ArrowRight"]) carGroup.position.x += 0.28;

carGroup.position.x += tilt*0.006;

carGroup.position.x=Math.max(-9,Math.min(9,carGroup.position.x));

/* CAR TILT */

carGroup.rotation.z=-carGroup.position.x*0.045;

/* NITRO */

nitroFlame.visible=nitro;

camera.fov = nitro ? 82 : 75;

camera.updateProjectionMatrix();

if(nitro) shakeCamera();

/* ROAD LINES */

roadLines.forEach(l=>{

l.position.z += moveSpeed;

if(l.position.z > carGroup.position.z+40){

l.position.z -= 12000;

}

});

/* BUILDINGS */

buildings.forEach(b=>{

if(b.position.z > carGroup.position.z+80){

b.position.z -= 8000;

}

});

/* ENEMIES */

enemies.forEach(e=>{

e.position.z += moveSpeed+0.5;

if(e.position.z > carGroup.position.z+60){

e.position.z -= 7500;

e.position.x=[-7,-4,0,4,7][Math.floor(Math.random()*5)];

}

if(
Math.abs(e.position.z-carGroup.position.z)<2 &&
Math.abs(e.position.x-carGroup.position.x)<1.6
){

endGame("💥 CRASHED");

}

});

/* OBSTACLES */

obstacles.forEach(o=>{

o.rotation.x += 0.03;
o.rotation.y += 0.03;

o.position.z += moveSpeed+0.3;

if(o.position.z > carGroup.position.z+50){

o.position.z -= 8500;

o.position.x=[-7,-4,0,4,7][Math.floor(Math.random()*5)];

}

if(
Math.abs(o.position.z-carGroup.position.z)<1.8 &&
Math.abs(o.position.x-carGroup.position.x)<1.5
){

endGame("🚧 HIT OBSTACLE");

}

});

/* COINS */

coins.forEach(c=>{

c.rotation.y += 0.1;

c.position.z += moveSpeed+0.4;

if(c.position.z > carGroup.position.z+50){

c.position.z -= 8500;

c.position.x=(Math.random()*12)-6;

}

if(
Math.abs(c.position.z-carGroup.position.z)<2 &&
Math.abs(c.position.x-carGroup.position.x)<1.5
){

score++;

scoreText.innerHTML="Coins: "+score;

c.position.z -= 8500;

}

});

/* RAIN */

if(rain.visible){

rain.position.z=carGroup.position.z;

const pos=rain.geometry.attributes.position;

for(let i=0;i<rainCount;i++){

pos.array[i*3+1]-=1.5;

if(pos.array[i*3+1]<0){

pos.array[i*3+1]=100;

}

}

pos.needsUpdate=true;

}

/* CAMERA */

camera.position.x += (carGroup.position.x-camera.position.x)*0.08;

camera.position.z += ((carGroup.position.z+14)-camera.position.z)*0.08;

camera.position.y += (6-camera.position.y)*0.08;

camera.lookAt(
carGroup.position.x,
carGroup.position.y+1,
carGroup.position.z-10
);

/* UI */

speedText.innerHTML="Speed: "+Math.floor(speed)+" km/h";

speedFill.style.width=(speed/140)*100+"%";

distanceText.innerHTML="Distance: "+Math.floor(distance)+" m";

/* WIN */

if(distance>15000){

endGame("🏆 YOU WON!");

}

}

renderer.render(scene,camera);

}

animate();

/* RESIZE */

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
  </html>
