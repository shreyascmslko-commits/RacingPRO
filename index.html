<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate City Racer PRO</title>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
font-family:Arial;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.6);
padding:12px;
border-radius:10px;
}

#message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:55px;
display:none;
text-align:center;
}

#controls{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
}

button{
font-size:22px;
padding:14px 20px;
margin:5px;
border:none;
border-radius:10px;
background:#ffffffcc;
}

#nitro{
background:#ff4444;
color:white;
}

#mode{
background:#4444ff;
color:white;
}
</style>
</head>

<body>

<div id="ui">
<div id="score">Coins: 0</div>
<div id="checkpoint">Checkpoint: 0</div>
</div>

<div id="message"></div>

<div id="controls">
<button id="left">⬅</button>
<button id="right">➡</button>
<button id="nitro">NITRO</button>
<button id="mode">DAY/NIGHT</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/* Scene */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

/* Camera */

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
8000
);

camera.position.set(0,6,14);

/* Renderer */

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

/* Lights */

let sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(10,40,20);
scene.add(sun);

scene.add(new THREE.AmbientLight(0xffffff,0.6));

/* ROAD (extended till finish) */

const roadLength = 7000;

const road = new THREE.Mesh(
new THREE.PlaneGeometry(20,roadLength),
new THREE.MeshStandardMaterial({color:0x444444})
);

road.rotation.x = -Math.PI/2;
road.position.z = -roadLength/2;

scene.add(road);

/* Buildings */

function randomColor(){
const colors=[0xff4d4d,0xffa64d,0xffff4d,0x4dff88,0x4dd2ff,0x7a4dff];
return colors[Math.floor(Math.random()*colors.length)];
}

function createBuilding(x,z){

let h=Math.random()*60+20;

let b=new THREE.Mesh(
new THREE.BoxGeometry(12,h,12),
new THREE.MeshStandardMaterial({color:randomColor()})
);

b.position.set(x,h/2,z);
scene.add(b);
}

for(let i=-6500;i<500;i+=35){
createBuilding(-32,i);
createBuilding(32,i);
}

/* Player Car */

const car = new THREE.Mesh(
new THREE.BoxGeometry(2,0.5,4),
new THREE.MeshStandardMaterial({color:0xffff00})
);

car.position.y=0.25;
scene.add(car);

/* Enemies */

const enemies=[];

function spawnEnemy(z){

let e=new THREE.Mesh(
new THREE.BoxGeometry(2,0.5,4),
new THREE.MeshStandardMaterial({color:0xff0000})
);

e.position.set(Math.random()*12-6,0.25,z);
scene.add(e);
enemies.push(e);

}

/* enemies till finish */

for(let i=-150;i>-6500;i-=80){
spawnEnemy(i);
}

/* Coins */

const coins=[];

function spawnCoin(z){

let c=new THREE.Mesh(
new THREE.CylinderGeometry(0.6,0.6,0.2,20),
new THREE.MeshStandardMaterial({color:0xffd700})
);

c.rotation.x=Math.PI/2;
c.position.set(Math.random()*12-6,1,z);

scene.add(c);
coins.push(c);

}

/* coins till finish */

for(let i=-100;i>-6500;i-=50){
spawnCoin(i);
}

/* Rain */

const rain=[];

for(let i=0;i<300;i++){

let drop=new THREE.Mesh(
new THREE.BoxGeometry(0.05,0.6,0.05),
new THREE.MeshBasicMaterial({color:0x66aaff})
);

drop.position.set(
Math.random()*100-50,
Math.random()*40+10,
Math.random()*200-100
);

scene.add(drop);
rain.push(drop);

}

/* Checkpoints */

let checkpoints=[-1000,-2000,-3000,-4000,-5000];
let checkpointIndex=0;

/* Finish */

const finish=new THREE.Mesh(
new THREE.BoxGeometry(20,6,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);

finish.position.set(0,3,-6500);
scene.add(finish);

/* Sounds */

const engineSound = new Audio("sounds/engine.mp3");
engineSound.loop=true;
engineSound.volume=0.3;
engineSound.play();

const coinSound = new Audio("sounds/coin.mp3");
const crashSound = new Audio("sounds/crash.mp3");

/* Controls */

let keys={};
let tilt=0;

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

window.addEventListener("deviceorientation",e=>{
tilt=e.gamma;
});

/* Mobile Buttons */

left.ontouchstart=()=>keys["ArrowLeft"]=true;
right.ontouchstart=()=>keys["ArrowRight"]=true;

left.ontouchend=()=>keys["ArrowLeft"]=false;
right.ontouchend=()=>keys["ArrowRight"]=false;

/* Nitro */

let nitro=false;

nitro.onclick=()=>nitro=true;
nitro.ontouchend=()=>nitro=false;

/* Day Night */

let night=false;

mode.onclick=function(){

night=!night;

if(night){
scene.background=new THREE.Color(0x000010);
}else{
scene.background=new THREE.Color(0x87ceeb);
}

}

/* Game State */

let score=0;
let gameOver=false;

const scoreDisplay=document.getElementById("score");
const cpDisplay=document.getElementById("checkpoint");

/* Game Loop */

function animate(){

requestAnimationFrame(animate);

if(!gameOver){

let speed=nitro?1.6:0.8;

car.position.z-=speed;

/* Steering */

car.position.x+=tilt*0.02;

if(keys["ArrowLeft"]) car.position.x-=0.4;
if(keys["ArrowRight"]) car.position.x+=0.4;

car.position.x=Math.max(-8,Math.min(8,car.position.x));

/* Enemies */

enemies.forEach(e=>{

if(
Math.abs(e.position.z-car.position.z)<2 &&
Math.abs(e.position.x-car.position.x)<1.6
){
crashSound.play();
endGame("💥 CRASHED");
}

});

/* Coins */

coins.forEach(c=>{

c.rotation.y+=0.1;

if(
Math.abs(c.position.z-car.position.z)<2 &&
Math.abs(c.position.x-car.position.x)<1.6
){

scene.remove(c);
score++;
coinSound.play();
scoreDisplay.innerText="Coins: "+score;

}

});

/* Rain animation */

rain.forEach(r=>{

r.position.y-=1;

if(r.position.y<0){
r.position.y=40;
}

});

/* Checkpoints */

if(checkpointIndex<checkpoints.length &&
car.position.z<checkpoints[checkpointIndex]){

checkpointIndex++;
cpDisplay.innerText="Checkpoint: "+checkpointIndex;

}

/* Finish */

if(car.position.z<-6500){
endGame("🏁 YOU WON!");
}

}

/* Camera */

camera.position.x=car.position.x;
camera.position.z=car.position.z+14;

camera.lookAt(car.position);

renderer.render(scene,camera);

}

animate();

/* End */

function endGame(text){

gameOver=true;

const msg=document.getElementById("message");
msg.innerHTML=text;
msg.style.display="block";

}

/* Resize */

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
